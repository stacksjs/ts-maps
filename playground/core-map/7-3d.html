      <h1>7. 3D — pitch, sky, fog</h1>
      <p class='subtitle'>
        Tilt the camera with <code>setPitch</code>, rotate with
        <code>setBearing</code>, colour the sky with <code>setSky</code>,
        and blend the horizon with <code>setFog</code>. The atmosphere
        overlay is painted via the same pipeline used by the globe
        halo — pure DOM, no WebGL dependency.
      </p>
