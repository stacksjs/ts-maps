<!doctype html>
<html lang='en'>
  <head>
    <meta charset='UTF-8' />
    <meta name='viewport' content='width=device-width, initial-scale=1.0' />
    <title>ts-maps — 1. Camera</title>
    <link rel='stylesheet' href='../../packages/ts-maps/src/core-map/ts-maps.css' />
    <link rel='stylesheet' href='./shared.css' />
    <style>
      .pin {
        width: 26px;
        height: 26px;
        border-radius: 50% 50% 50% 0;
        background: #4f46e5;
        border: 2px solid #ffffff;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.35);
        transform: rotate(-45deg);
      }
      .pin::after {
        content: '';
        display: block;
        width: 8px;
        height: 8px;
        margin: 6px 0 0 6px;
        border-radius: 50%;
        background: #ffffff;
      }

      .camera-layout {
        display: grid;
        grid-template-columns: 280px 1fr;
        gap: 16px;
        align-items: start;
      }
      @media (max-width: 720px) {
        .camera-layout {
          grid-template-columns: 1fr;
        }
      }

      .camera-controls {
        display: flex;
        flex-direction: column;
        gap: 14px;
        padding: 14px 18px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
      }
      .camera-controls .control-row {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .camera-controls label {
        color: var(--muted);
        font-size: 13px;
        display: flex;
        justify-content: space-between;
        align-items: baseline;
      }
      .camera-controls input[type='range'] {
        width: 100%;
      }
      .camera-controls .value-badge {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        color: var(--accent);
        font-size: 12px;
      }
      .camera-controls button {
        padding: 8px 12px;
        background: var(--surface-2);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
      }
      .camera-controls button:hover {
        background: var(--bg);
      }
    </style>
  </head>
  <body>
    <div class='demo-page'>
      <nav class='crumbs'>
        <a href='./index.html'>core-map playground</a>
        <span>/</span>
        <span>1. Camera</span>
      </nav>
      <h1>1. Camera — bearing + pitch</h1>
      <p class='subtitle'>
        Rotate, pitch, and fly — smooth animated camera.
      </p>

      <div class='camera-layout'>
        <div class='camera-controls'>
          <div class='control-row'>
            <label for='bearing'>
              <span>Bearing</span>
              <span id='bearing-value' class='value-badge'>0°</span>
            </label>
            <input id='bearing' type='range' min='0' max='359' step='1' value='0' />
          </div>
          <div class='control-row'>
            <label for='pitch'>
              <span>Pitch</span>
              <span id='pitch-value' class='value-badge'>0°</span>
            </label>
            <input id='pitch' type='range' min='0' max='60' step='1' value='0' />
          </div>
          <button id='fly-nyc' type='button'>Fly to NYC</button>
          <button id='ease-tokyo' type='button'>Ease to Tokyo</button>
          <button id='reset-camera' type='button'>Reset camera</button>
        </div>

        <div id='map' class='map-host'></div>
      </div>
    </div>

    <script type='module' src='./1-camera.ts'></script>
  </body>
</html>
